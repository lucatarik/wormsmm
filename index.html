<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="description" content="Worms Online - A multiplayer turn-based artillery game" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Worms Online" />
  <title>Worms Online</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-title {
      color: #e8c86d;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 30px rgba(232, 200, 109, 0.5);
      margin-bottom: 2rem;
    }

    #loading-bar-container {
      width: 300px;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    #loading-bar {
      height: 100%;
      background: linear-gradient(90deg, #e8c86d, #ff6b35);
      border-radius: 4px;
      width: 0%;
      transition: width 0.3s ease;
    }

    #loading-text {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div id="loading-title">WORMS ONLINE</div>
    <div id="loading-bar-container">
      <div id="loading-bar"></div>
    </div>
    <div id="loading-text">Loading...</div>
  </div>

  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script type="module" src="js/main.js"></script>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }

    // Loading progress simulation
    const bar = document.getElementById('loading-bar');
    const text = document.getElementById('loading-text');
    let progress = 0;
    const steps = [
      { pct: 20, msg: 'Loading engine...' },
      { pct: 45, msg: 'Building terrain...' },
      { pct: 70, msg: 'Spawning worms...' },
      { pct: 90, msg: 'Connecting network...' },
      { pct: 100, msg: 'Ready!' },
    ];
    let stepIndex = 0;
    const interval = setInterval(() => {
      if (stepIndex < steps.length) {
        const step = steps[stepIndex++];
        bar.style.width = step.pct + '%';
        text.textContent = step.msg;
      } else {
        clearInterval(interval);
      }
    }, 400);

    window.hideLoadingOverlay = function() {
      const overlay = document.getElementById('loading-overlay');
      overlay.classList.add('hidden');
      setTimeout(() => overlay.remove(), 600);
    };
  </script>
</body>
</html>
